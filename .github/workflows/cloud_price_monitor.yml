name: Cloud Price Monitor

on:
  schedule:
    # 北京时间 8:00 和 20:00 (UTC 0:00 和 12:00)
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      send_report:
        description: 'Send Telegram report even if no changes'
        required: false
        default: 'true'

jobs:
  monitor:
    name: Cloud Price Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run price monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 tools/cloud_price_monitor_github.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add cloud_prices/
          git diff --staged --quiet || git commit -m "chore: update cloud prices $(date +%Y-%m-%d)"
          git push

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=❌ 云价格监控失败！请检查 GitHub Actions 日志" \
              > /dev/null
          fi
