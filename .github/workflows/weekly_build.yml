name: Build ImmortalWrt x86_64

on:
  push:
    branches:
      - master
    paths:
      - '.config'
      - '.github/workflows/weekly_build.yml'
      - 'files/**'
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (rebuild everything)'
        required: false
        default: 'false'

jobs:
  build:
    name: Build ImmortalWrt x86_64 EFI
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Display .config info
        run: |
          if [ -f ".config" ]; then
            echo "✅ .config exists"
            echo "   Size: $(du -h .config | cut -f1)"
            echo "   Package count: $(grep -c '^CONFIG_PACKAGE_' .config)"
            echo "   LuCI packages: $(grep -c '^CONFIG_PACKAGE_luci' .config)"
          else
            echo "❌ .config NOT found!"
            exit 1
          fi

      - name: Copy custom files
        run: |
          if [ -d "files" ]; then
            echo "📁 Copying custom files..."
            cp -rf files/* ./
            echo "✅ Custom files copied"
          else
            echo "⚠️ No files directory to copy"
          fi

      - name: Initialize feeds
        run: |
          echo "=== Step 1: Update feeds ==="
          ./scripts/feeds update -a
          
          echo "=== Step 2: Install feeds ==="
          ./scripts/feeds install -a
          
          echo "=== Step 3: Verify luci ==="
          if [ -d "feeds/luci/collections/luci" ]; then
            echo "✅ luci collection exists"
            ls feeds/luci/collections/
          else
            echo "❌ luci collection NOT found!"
            echo "Available feeds:"
            ls -la feeds/
            exit 1
          fi

      - name: Prepare config
        run: |
          echo "=== 保留原始 .config ==="
          cp .config .config.keep
          
          echo "=== 运行 make defconfig (生成 .config) ==="
          yes '' | make defconfig 2>&1 | tail -20
          
          echo "=== 恢复原始配置覆盖 ==="
          cp .config.keep .config
          
          echo "=== 最终配置包数量 ==="
          echo "Packages: $(grep -c '^CONFIG_PACKAGE_' .config)"
          echo "LuCI: $(grep -c '^CONFIG_PACKAGE_luci' .config)"

      - name: Install qemu-img
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils

      - name: Download toolchain
        run: make download -j$(nproc)

      - name: Compile firmware
        run: |
          echo "=== 开始编译 ==="
          echo "CPU cores: $(nproc)"
          make -j$(nproc) 2>&1 | tail -50

      - name: Check output
        run: |
          echo "=== 检查编译产物 ==="
          find bin/targets -name "*.img.gz" -ls 2>/dev/null || echo "No img.gz found"
          ls -la bin/targets/x86/64/ 2>/dev/null || echo "Target dir not found"

      - name: Rename and package firmware
        run: |
          echo "=== 检查编译产物 ==="
          find bin -type f -name "*.img*" 2>/dev/null || echo "No img files"
          
          # 灵活查找任意 .img.gz 文件
          SOURCE_FILE=$(find bin -name "*.img.gz" -type f 2>/dev/null | head -1)
          
          if [ -z "$SOURCE_FILE" ]; then
            echo "❌ 未找到固件文件"
            echo "=== bin 目录内容 ==="
            ls -laR bin/ | head -50
            exit 1
          fi
          
          echo "✅ 找到固件：$SOURCE_FILE"
          
          BASENAME=$(basename "$SOURCE_FILE")
          DATE=$(date +%Y%m%d)
          TARGET_FILE="Z-ImmWrt-${DATE}-zuoxm-x86_64-efi.img.gz"
          
          cp "$SOURCE_FILE" "$TARGET_FILE"
          sha256sum "$TARGET_FILE" > "${TARGET_FILE}.sha256"
          
          echo "✅ 固件打包完成"
          echo "   源文件：$BASENAME"
          echo "   目标文件：$TARGET_FILE"
          ls -lh "$TARGET_FILE" "${TARGET_FILE}.sha256"

      - name: Upload to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: ImmortalWrt x86_64 EFI - ${{ github.run_number }}
          body: |
            **Build Time:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
            **Platform:** x86_64 EFI
            **Firmware Size:** $(ls -lh bin/targets/x86/64/Z-ImmWrt-*.img.gz | awk '{print $5}')
          files: |
            bin/targets/x86/64/Z-ImmWrt-*.img.gz
            bin/targets/x86/64/Z-ImmWrt-*.sha256
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
