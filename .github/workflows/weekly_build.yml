name: Weekly Build

on:
  schedule:
    - cron: '0 2 * * 0'  # 每周日凌晨 2 点 UTC (北京时间 10:00)
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (rebuild everything)'
        required: false
        default: 'false'

jobs:
  build:
    name: Build ImmortalWrt
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy custom files
        run: |
          if [ -d "files" ]; then
            cp -rf files/* ./
          fi

      - name: Apply .config
        run: |
          ls -la .config || echo "No .config found"
          cp -f .config .config.backup 2>/dev/null || true
          make defconfig

      - name: Download toolchain
        run: make download -j$(nproc)

      - name: Install qemu-img
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils

      - name: Compile firmware
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: Package firmware
        run: |
          cd bin/targets/x86/64
          
          # 重命名 EFI 固件（按本地脚本命名规则）
          # 格式：Z-ImmWrt-YYYYMMDD-zuoxm-x86_64-efi.img.gz
          BUILD_DATE=$(date +"%Y%m%d")
          
          # 查找最新的 EFI 固件
          EFI_IMAGE=$(find . -maxdepth 1 -type f -name "*-efi.img.gz" ! -name "Z-ImmWrt-*" | head -n 1)
          
          if [ -n "$EFI_IMAGE" ]; then
            NEW_NAME="Z-ImmWrt-${ build_date }-zuoxm-x86_64-efi.img.gz"
            echo "重命名固件：$EFI_IMAGE -> $NEW_NAME"
            mv -f "$EFI_IMAGE" "$NEW_NAME"
            
            # 同时生成对应的 sha256sum
            sha256sum "$NEW_NAME" > sha256sums.txt
          else
            echo "未找到 EFI 固件"
            exit 1
          fi
          
          # 复制到其他格式（如果需要）
          # cp Z-ImmWrt-${ build_date }-zuoxm-x86_64-efi.img.gz Z-ImmWrt-${ build_date }-zuoxm-x86_64-legacy.img.gz 2>/dev/null || true

      - name: Upload to Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: weekly-build-${{ github.run_number }}
          name: Weekly Build ${{ github.run_number }}
          body: |
            **Build Time:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
            Auto-built firmware with custom configurations.
          files: |
            bin/targets/*/*/*.img.gz
            bin/targets/*/*/*.bin
            bin/targets/*/*/*.iso
            bin/targets/*/*/*sha256sums.txt
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Build failed! Check logs."
