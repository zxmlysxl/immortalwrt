name: Build ImmortalWrt x86_64

on:
  push:
    branches:
      - master
    paths:
      - '.config'
      - '.github/workflows/weekly_build.yml'
      - 'files/**'
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (rebuild everything)'
        required: false
        default: 'false'

jobs:
  build:
    name: Build ImmortalWrt x86_64 EFI
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Display .config info
        run: |
          if [ -f ".config" ]; then
            echo "✅ .config exists"
            echo "   Size: $(du -h .config | cut -f1)"
            echo "   Package count: $(grep -c '^CONFIG_PACKAGE_' .config)"
            echo "   LuCI packages: $(grep -c '^CONFIG_PACKAGE_luci' .config)"
          else
            echo "❌ .config NOT found!"
            exit 1
          fi

      - name: Copy custom files
        run: |
          if [ -d "files" ]; then
            echo "📁 Copying custom files..."
            cp -rf files/* ./
            echo "✅ Custom files copied"
          else
            echo "⚠️ No files directory to copy"
          fi

      - name: Initialize feeds
        run: |
          echo "=== Step 1: Backup .config ==="
          cp .config .config.backup
          
          echo "=== Step 2: Update feeds ==="
          ./scripts/feeds update -a
          
          echo "=== Step 3: Install feeds (只安装非 LuCI 包) ==="
          # 不安装所有包，避免覆盖 .config 配置
          ./scripts/feeds install -a -p packages -p routing -p telephony -p video -p zuoxm
          
          echo "=== Step 4: Restore .config ==="
          cp .config.backup .config
          
          echo "=== Step 5: Verify luci ==="
          if [ -d "feeds/luci/collections/luci" ]; then
            echo "✅ luci collection exists"
            ls feeds/luci/collections/
          else
            echo "❌ luci collection NOT found!"
            echo "Available feeds:"
            ls -la feeds/
            exit 1
          fi
          
          echo "=== Step 6: Verify .config ==="
          echo "LuCI packages after restore: $(grep -c '^CONFIG_PACKAGE_luci' .config)"

      - name: Prepare config
        run: |
          echo "=== 保留原始 .config ==="
          cp .config .config.keep
          
          echo "=== 禁用有问题的包 ==="
          # 移除 openvswitch 相关配置避免递归依赖
          sed -i '/openvswitch/d' .config
          
          echo "=== 跳过 olddefconfig，直接使用 .config ==="
          # olddefconfig 会移除 EFI 和 LuCI 相关配置，导致镜像无法生成
          # 直接使用 .config 中的配置
          
          echo "=== 验证配置完整性 ==="
          echo "原始包数量：$(grep -c '^CONFIG_PACKAGE_' .config.keep)"
          echo "最终包数量：$(grep -c '^CONFIG_PACKAGE_' .config)"
          echo "LuCI 包数量：$(grep -c '^CONFIG_PACKAGE_luci' .config)"
          echo "EFI Images: $(grep 'CONFIG_EFI' .config || echo 'NOT FOUND')"
          echo "GRUB EFI: $(grep 'CONFIG_GRUB_EFI' .config || echo 'NOT FOUND')"
          echo "VMDK: $(grep 'CONFIG_VMDK' .config || echo 'NOT FOUND')"
          echo "EXT4FS: $(grep 'CONFIG_TARGET_ROOTFS_EXT4FS' .config || echo 'NOT FOUND')"

      - name: Install qemu-img
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils

      - name: Download toolchain
        run: make download -j$(nproc)

      - name: Compile firmware
        run: |
          echo "=== 开始编译 ==="
          echo "CPU cores: $(nproc)"
          echo "=== 当前目录 ==="
          pwd
          echo "=== .config 中的目标平台 ==="
          grep "CONFIG_TARGET" .config | head -10
          
          echo "=== 第一步：编译工具链和包 (V=s 详细日志) ==="
          make -j$(nproc) V=s 2>&1 | tee /tmp/build.log | tail -200
          
          echo "=== 第二步：生成镜像 (target/install) ==="
          make target/install 2>&1 | tee -a /tmp/build.log | tail -50
          
          echo "=== 编译结束 ==="
          echo "=== 检查 bin 目录 ==="
          ls -la bin/ 2>/dev/null || echo "bin dir not found"
          ls -la bin/targets/x86/64/ 2>/dev/null || echo "targets dir not found"
          find bin -name "*.img*" -o -name "*.vmdk*" -o -name "*.ext4*" 2>/dev/null | head -20 || echo "No image files"

      - name: Check output
        run: |
          echo "=== 检查编译产物 ==="
          find bin/targets -name "*.img.gz" -ls 2>/dev/null || echo "No img.gz found"
          ls -la bin/targets/x86/64/ 2>/dev/null || echo "Target dir not found"

      - name: Rename and package firmware
        run: |
          echo "=== 检查编译产物 ==="
          find bin -type f -name "*.img*" 2>/dev/null || echo "No img files"
          
          # 优先选择 ext4-combined-efi 文件（完整固件 ~148MB）
          SOURCE_FILE=$(find bin/targets -type f -name "*ext4-combined-efi.img.gz" 2>/dev/null | head -1)
          
          # 如果没有 ext4 文件，再尝试其他格式
          if [ -z "$SOURCE_FILE" ]; then
            SOURCE_FILE=$(find bin/targets -type f \( -name "*.img.gz" -o -name "*.img" -o -name "*.vmdk" \) 2>/dev/null | grep -v rootfs | head -1)
          fi
          
          if [ -z "$SOURCE_FILE" ]; then
            echo "❌ 未找到固件文件"
            echo "=== bin 目录内容 ==="
            ls -laR bin/ | head -50
            exit 1
          fi
          
          echo "✅ 找到固件：$SOURCE_FILE"
          
          BASENAME=$(basename "$SOURCE_FILE")
          DATE=$(date +%Y%m%d)
          TARGET_FILE="Z-ImmWrt-${DATE}-zuoxm-x86_64-efi.img.gz"
          
          cp "$SOURCE_FILE" "$TARGET_FILE"
          sha256sum "$TARGET_FILE" > "${TARGET_FILE}.sha256"
          
          echo "✅ 固件打包完成"
          echo "   源文件：$BASENAME"
          echo "   目标文件：$TARGET_FILE"
          ls -lh "$TARGET_FILE" "${TARGET_FILE}.sha256"

      - name: Upload to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: ImmortalWrt x86_64 EFI - ${{ github.run_number }}
          body: |
            **Build Time:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
            **Platform:** x86_64 EFI
            **Firmware Size:** $(ls -lh Z-ImmWrt-*.img.gz | awk '{print $5}')
          files: |
            Z-ImmWrt-*.img.gz
            Z-ImmWrt-*.sha256
            bin/targets/x86/64/*.manifest
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
