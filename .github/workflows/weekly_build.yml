name: Build ImmortalWrt x86_64

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (rebuild everything)'
        required: false
        default: 'false'

jobs:
  build:
    name: Build ImmortalWrt x86_64 EFI
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy custom files
        run: |
          if [ -d "files" ]; then
            cp -rf files/* ./
          fi

      - name: Initialize feeds
        run: |
          echo "=== Updating feeds ==="
          ./scripts/feeds update -a
          echo "=== Installing feeds (1st pass) ==="
          ./scripts/feeds install -a
          echo "=== Installing feeds (2nd pass) ==="
          ./scripts/feeds install -a
          echo "=== Checking luci package ==="
          if [ -d "feeds/luci/collections/luci" ]; then
            echo "✅ luci package found"
            ls -la feeds/luci/collections/luci/
          else
            echo "❌ luci package NOT found!"
            find . -name "luci" -type d 2>/dev/null | head -10
          fi

      - name: Apply .config
        run: |
          if [ -f ".config" ]; then
            echo "Using .config file directly..."
            chmod +r .config
            echo "Config file size: $(du -h .config | cut -f1)"
            echo "Package count: $(grep -c '^CONFIG_PACKAGE_' .config)"
            echo "LuCI packages: $(grep -c '^CONFIG_PACKAGE_luci' .config)"
          else
            make defconfig
          fi

      - name: Install qemu-img
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils

      - name: Download toolchain
        run: make download -j$(nproc)

      - name: Compile firmware
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: Rename and package firmware
        run: |
          cd bin/targets/x86/64
          DATE=$(date +%Y%m%d)
          SOURCE_FILE="immortalwrt-x86-64-generic-squashfs-combined-efi.img.gz"
          TARGET_FILE="Z-ImmWrt-${DATE}-zuoxm-x86_64-efi.img.gz"
          if [ -f "$SOURCE_FILE" ]; then
            cp "$SOURCE_FILE" "$TARGET_FILE"
            sha256sum "$TARGET_FILE" > "${TARGET_FILE}.sha256"
            rm -f "$SOURCE_FILE"
            ls -lh "$TARGET_FILE"*
          else
            echo "Error: Firmware file not found!"
            exit 1
          fi

      - name: Upload to Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: ImmortalWrt x86_64 EFI - ${{ github.run_number }}
          body: |
            **Build Time:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
            **Platform:** x86_64 EFI
          files: |
            bin/targets/x86/64/Z-ImmWrt-*.img.gz
            bin/targets/x86/64/Z-ImmWrt-*.sha256
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
