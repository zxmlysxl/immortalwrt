name: Build ImmortalWrt x86_64

on:
  push:
    branches:
      - master
    paths:
      - '.config'
      - '.github/workflows/weekly_build.yml'
      - 'files/**'
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (rebuild everything)'
        required: false
        default: 'false'
      sync_upstream:
        description: 'Sync with upstream before build'
        required: false
        default: 'false'

jobs:
  build:
    name: Build ImmortalWrt x86_64 EFI
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: true

      - name: Set up git config
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git config --global init.defaultBranch master
          git config --global pull.rebase false

      - name: Sync upstream
        run: |
          echo "=== 添加上游仓库 ==="
          git remote add upstream https://github.com/immortalwrt/immortalwrt.git 2>/dev/null || git remote set-url upstream https://github.com/immortalwrt/immortalwrt.git
          git remote -v
          
          echo "=== 获取上游最新代码 ==="
          # Fetch with tags to get full history for merge-base calculation
          git fetch upstream master --tags --depth=1000
          
          echo "=== 检查本地与上游的差异 ==="
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/master)
          
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "✅ 本地已是最新，无需同步"
          else
            echo "📦 检测到上游有更新，准备同步..."
            echo "   本地: $(git log -1 --format='%H %s' HEAD)"
            echo "   上游: $(git log -1 --format='%H %s' upstream/master)"
            
            echo "=== 备份本地配置与自定义文件 ==="
            cp .config .config.local 2>/dev/null || true
            if [ -d "files" ]; then
              cp -a files files.local 2>/dev/null || true
              echo "   ✅ 已备份 files/ 目录"
            fi
            
            echo "=== 合并上游更新（recursive theirs策略） ==="
            # 使用 theirs 策略，保留上游的修改（config文件以本地为主）
            if git merge -s recursive -X theirs --allow-unrelated-histories upstream/master --no-edit 2>&1; then
              echo "✅ 合并成功"
            else
              echo "⚠️ 合并冲突，使用本地配置..."
              git merge --abort 2>/dev/null || true
              git checkout --ours .config 2>/dev/null || true
            fi
            
            echo "=== 恢复本地 .config 与自定义文件 ==="
            cp .config.local .config 2>/dev/null || true
            if [ -d "files.local" ]; then
              rm -rf files 2>/dev/null
              cp -a files.local files 2>/dev/null || true
              rm -rf files.local
              echo "   ✅ 已恢复 files/ 目录"
            fi
            
            echo "=== 验证同步结果 ==="
            echo "本地 commits: $(git log --oneline -3)"
            echo "上游 commits: $(git log upstream/master --oneline -3)"
          fi

      - name: Display .config info
        run: |
          if [ -f ".config" ]; then
            echo "✅ .config exists"
            echo "   Size: $(du -h .config | cut -f1)"
            echo "   Package count: $(grep -c '^CONFIG_PACKAGE_' .config)"
            echo "   LuCI packages: $(grep -c '^CONFIG_PACKAGE_luci' .config)"
          else
            echo "❌ .config NOT found!"
            echo "   ⚠️ .config 不存在，将在 Initialize feeds 步骤中由 make defconfig 生成"
          fi

      - name: Sync with upstream (optional)
        if: github.event.inputs.sync_upstream == 'true'
        run: |
          echo "=== 同步上游代码 ==="
          git remote add upstream https://github.com/immortalwrt/immortalwrt.git 2>/dev/null || true
          git fetch upstream master --tags --depth=2000 && git merge --allow-unrelated-histories upstream/master --no-edit
          echo "✅ 上游同步完成"

      - name: Verify files directory
        run: |
          echo "=== 检查 files 目录结构 ==="
          if [ -d "files" ]; then
            echo "✅ files 目录存在"
            echo ""
            echo "📁 files/root/:"
            find files/root -type f 2>/dev/null | head -20
            echo ""
            echo "📁 files/etc/:"
            find files/etc -type f 2>/dev/null | head -10
            echo ""
            echo "总计文件数: $(find files -type f | wc -l)"
          else
            echo "⚠️ files 目录不存在"
            exit 1
          fi

      - name: Update compile_info
        run: |
          echo "=== 更新 compile_info ==="
          BUILD_DATE=$(date +%Y%m%d%H%M)
          echo "Z-ImmortalWrt ${BUILD_DATE} by zuoxm | R$(date +%y.%m.%d)" > files/etc/compile_info
          echo "   Build info: $(cat files/etc/compile_info)"

      - name: Initialize feeds
        run: |
          echo "=== Step 1: Backup original .config ==="
          cp .config .config.original
          echo "   LuCI packages in original: $(grep -c '^CONFIG_PACKAGE_luci' .config.original)"
          
          echo "=== Step 2: Extract luci-app packages list ==="
          grep '^CONFIG_PACKAGE_luci-app' .config.original > /tmp/luci-apps.txt || true
          echo "   Found $(wc -l < /tmp/luci-apps.txt) luci-app packages"
          
          echo "=== Step 2b: Extract theme packages list ==="
          grep '^CONFIG_PACKAGE_luci-theme' .config.original > /tmp/luci-themes.txt || true
          echo "   Found $(wc -l < /tmp/luci-themes.txt) theme packages"
          
          echo "=== Step 2c: Extract zsh package ==="

          echo "=== Step 2d: Extract luci-mod packages list ==="
          grep '^CONFIG_PACKAGE_luci-mod' .config.original > /tmp/luci-mods.txt || true
          echo "   Found $(wc -l < /tmp/luci-mods.txt) luci-mod packages"

          echo "=== Step 2e: Extract luci-i18n packages list ==="
          grep '^CONFIG_PACKAGE_luci-i18n' .config.original > /tmp/luci-i18n.txt || true
          echo "   Found $(wc -l < /tmp/luci-i18n.txt 2>/dev/null || echo 0) luci-i18n packages"
          grep '^CONFIG_PACKAGE_zsh=' .config.original > /tmp/zsh-package.txt || true
          echo "   zsh package: $(cat /tmp/zsh-package.txt 2>/dev/null || echo 'not found')"
          
          echo "=== Step 2f: Extract base luci packages (luci, luci-base, luci-lib-*, etc.) ==="
          # Extract base luci packages: meta-packages (luci, luci-light, luci-base, luci-compat, luci-lua-runtime) and luci-lib-* packages
          grep -E '^CONFIG_PACKAGE_luci(-lib|-light|-base|-compat|-lua-runtime)?=|^CONFIG_PACKAGE_luci-lib-' .config.original > /tmp/luci-base.txt || true
          echo "   Found $(wc -l < /tmp/luci-base.txt 2>/dev/null || echo 0) base luci packages"
          
          echo "=== Step 3: Remove problematic packages ==="
          # 完全移除有冲突的包
          sed -i '/^CONFIG_PACKAGE.*openvswitch/d' .config
          sed -i '/^CONFIG_PACKAGE.*ovsd/d' .config
          sed -i '/^CONFIG_PACKAGE_shadowsocksr-libev/d' .config
          # mihomo-alpha 与 mihomo-meta 互斥，只能保留 meta（openclash 依赖它）
          sed -i '/^CONFIG_PACKAGE_mihomo-alpha/d' .config
          # 禁用 passwall2 中依赖 shadowsocksr-libev 的 include 选项
          sed -i '/INCLUDE_ShadowsocksR_Libev_Client/d' .config
          sed -i '/INCLUDE_Shadowsocks_Libev_Client/d' .config
          echo "   ✅ Problematic packages removed"
          
          set +e
          echo "=== Step 4: Update feeds (120s timeout) ==="
          (timeout 120 ./scripts/feeds update -a 2>&1 || true) | tee /tmp/feeds_update.log
          FEEDS_U_EXIT=${PIPESTATUS[0]}
          echo "   feeds update exit code: $FEEDS_U_EXIT"
          tail -5 /tmp/feeds_update.log || true
          
          echo "=== Step 5: Install feeds (180s timeout) ==="
          FEEDS_COUNT=$(find package/feeds/luci -maxdepth 1 -type d 2>/dev/null | wc -l)
          echo "   Feeds luci-app directories: $FEEDS_COUNT"
          if [ "$FEEDS_COUNT" -lt 5 ]; then
            echo "⚠️ Warning: Only $FEEDS_COUNT luci-app feeds found (expected more)"
            echo "   Available feeds:"
            ls -la package/feeds/ 2>/dev/null || echo "   package/feeds/ not found"
          fi
          (timeout 180 ./scripts/feeds install -a 2>&1 || true) | tee /tmp/feeds_install.log
          echo "   feeds install exit code: ${PIPESTATUS[0]}"
          
          echo "=== Step 7: Restore luci-app packages ==="
          # Restore luci-app packages: handle both # is not set AND completely missing lines
          while IFS= read -r pkg; do
            base_pkg=$(echo "$pkg" | sed 's/CONFIG_PACKAGE_//;s/=y//')
            if grep -q "^# CONFIG_PACKAGE_${base_pkg} is not set" .config 2>/dev/null; then
              # Case 1: commented out
              sed -i "s/# CONFIG_PACKAGE_${base_pkg} is not set/CONFIG_PACKAGE_${base_pkg}=y/" .config
              echo "   ✅ Restored (uncommented): $base_pkg"
            elif ! grep -q "^CONFIG_PACKAGE_${base_pkg}=" .config 2>/dev/null; then
              # Case 2: completely missing — add it back
              echo "CONFIG_PACKAGE_${base_pkg}=y" >> .config
              echo "   ✅ Restored (added): $base_pkg"
            fi
          done < /tmp/luci-apps.txt
          
          echo "=== Step 7b: Restore theme packages ==="
          while IFS= read -r pkg; do
            base_pkg=$(echo "$pkg" | sed 's/CONFIG_PACKAGE_//;s/=y//')
            if grep -q "^# CONFIG_PACKAGE_${base_pkg} is not set" .config 2>/dev/null; then
              sed -i "s/# CONFIG_PACKAGE_${base_pkg} is not set/CONFIG_PACKAGE_${base_pkg}=y/" .config
              echo "   ✅ Restored theme (uncommented): $base_pkg"
            elif ! grep -q "^CONFIG_PACKAGE_${base_pkg}=" .config 2>/dev/null; then
              echo "CONFIG_PACKAGE_${base_pkg}=y" >> .config
              echo "   ✅ Restored theme (added): $base_pkg"
            fi
          done < /tmp/luci-themes.txt
          
          echo "=== Step 7c: Restore zsh package ==="
          while IFS= read -r pkg; do
            base_pkg=$(echo "$pkg" | sed 's/CONFIG_PACKAGE_//;s/=y//')
            if grep -q "^# CONFIG_PACKAGE_${base_pkg} is not set" .config 2>/dev/null; then
              sed -i "s/# CONFIG_PACKAGE_${base_pkg} is not set/CONFIG_PACKAGE_${base_pkg}=y/" .config
              echo "   ✅ Restored: $base_pkg"
            fi
          done < /tmp/zsh-package.txt
          

          echo "=== Step 7d: Restore luci-mod packages ==="
          while IFS= read -r pkg; do
            base_pkg=$(echo "$pkg" | sed 's/CONFIG_PACKAGE_//;s/=y//')
            if grep -q "^# CONFIG_PACKAGE_${base_pkg} is not set" .config 2>/dev/null; then
              sed -i "s/# CONFIG_PACKAGE_${base_pkg} is not set/CONFIG_PACKAGE_${base_pkg}=y/" .config
              echo "   ✅ Restored mod (uncommented): $base_pkg"
            elif ! grep -q "^CONFIG_PACKAGE_${base_pkg}=" .config 2>/dev/null; then
              echo "CONFIG_PACKAGE_${base_pkg}=y" >> .config
              echo "   ✅ Restored mod (added): $base_pkg"
            fi
          done < /tmp/luci-mods.txt

          echo "=== Step 7e: Restore luci-i18n packages ==="
          while IFS= read -r pkg; do
            base_pkg=$(echo "$pkg" | sed 's/CONFIG_PACKAGE_//;s/=y//')
            if grep -q "^# CONFIG_PACKAGE_${base_pkg} is not set" .config 2>/dev/null; then
              sed -i "s/# CONFIG_PACKAGE_${base_pkg} is not set/CONFIG_PACKAGE_${base_pkg}=y/" .config
              echo "   ✅ Restored i18n (uncommented): $base_pkg"
            elif ! grep -q "^CONFIG_PACKAGE_${base_pkg}=" .config 2>/dev/null; then
              echo "CONFIG_PACKAGE_${base_pkg}=y" >> .config
              echo "   ✅ Restored i18n (added): $base_pkg"
            fi
          done < /tmp/luci-i18n.txt 2>/dev/null || true
          
          echo "=== Step 7f: Restore luci-proto packages (including luci-proto-wireguard) ==="
          grep '^CONFIG_PACKAGE_luci-proto' .config.original > /tmp/luci-protos.txt || true
          while IFS= read -r pkg; do
            base_pkg=$(echo "$pkg" | sed 's/CONFIG_PACKAGE_//;s/=y//')
            if grep -q "^# CONFIG_PACKAGE_${base_pkg} is not set" .config 2>/dev/null; then
              sed -i "s/# CONFIG_PACKAGE_${base_pkg} is not set/CONFIG_PACKAGE_${base_pkg}=y/" .config
              echo "   ✅ Restored proto (uncommented): $base_pkg"
            elif ! grep -q "^CONFIG_PACKAGE_${base_pkg}=" .config 2>/dev/null; then
              echo "CONFIG_PACKAGE_${base_pkg}=y" >> .config
              echo "   ✅ Restored proto (added): $base_pkg"
            fi
          done < /tmp/luci-protos.txt 2>/dev/null || true
          
          echo "=== Step 7g: Restore wireguard-related kernel/tools ==="
          grep '^CONFIG_PACKAGE_kmod-wireguard\|^CONFIG_PACKAGE_wireguard-tools' .config.original > /tmp/wireguard-tools.txt 2>/dev/null || true
          while IFS= read -r pkg; do
            base_pkg=$(echo "$pkg" | sed 's/CONFIG_PACKAGE_//;s/=y//')
            if grep -q "^# CONFIG_PACKAGE_${base_pkg} is not set" .config 2>/dev/null; then
              sed -i "s/# CONFIG_PACKAGE_${base_pkg} is not set/CONFIG_PACKAGE_${base_pkg}=y/" .config
              echo "   ✅ Restored wg (uncommented): $base_pkg"
            elif ! grep -q "^CONFIG_PACKAGE_${base_pkg}=" .config 2>/dev/null; then
              echo "CONFIG_PACKAGE_${base_pkg}=y" >> .config
              echo "   ✅ Restored wg (added): $base_pkg"
            fi
          done < /tmp/wireguard-tools.txt 2>/dev/null || true
          
          echo "=== Step 7h: Restore base luci packages (luci, luci-base, luci-lib-*, etc.) ==="
          while IFS= read -r pkg; do
            base_pkg=$(echo "$pkg" | sed 's/^CONFIG_PACKAGE_//;s/=y//')
            if grep -q "^# CONFIG_PACKAGE_${base_pkg} is not set" .config 2>/dev/null; then
              sed -i "s/# CONFIG_PACKAGE_${base_pkg} is not set/CONFIG_PACKAGE_${base_pkg}=y/" .config
              echo "   ✅ Restored base (uncommented): $base_pkg"
            elif ! grep -q "^CONFIG_PACKAGE_${base_pkg}=" .config 2>/dev/null; then
              echo "CONFIG_PACKAGE_${base_pkg}=y" >> .config
              echo "   ✅ Restored base (added): $base_pkg"
            fi
          done < /tmp/luci-base.txt 2>/dev/null || true
          
          echo "=== Step 8: Enable Simplified Chinese language support ==="
          # Use zh_Hans which is the actual Kconfig symbol (not zh-cn)
          sed -i 's/^# CONFIG_LUCI_LANG_zh_Hans is not set$/CONFIG_LUCI_LANG_zh_Hans=y/' .config
          if grep -q "^CONFIG_LUCI_LANG_zh_Hans=" .config 2>/dev/null; then
            echo "   ✅ Enabled CONFIG_LUCI_LANG_zh_Hans (Simplified Chinese)"
          else
            echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
            echo "   ✅ Added CONFIG_LUCI_LANG_zh_Hans=y"
          fi
          
          echo "=== Step 8b: Enable custom firmware version ==="
          sed -i 's/^# CONFIG_VERSIONOPT is not set$/CONFIG_VERSIONOPT=y/' .config
          if grep -q "^CONFIG_VERSIONOPT=" .config 2>/dev/null; then
            echo "   ✅ Enabled CONFIG_VERSIONOPT=y"
          else
            echo "CONFIG_VERSIONOPT=y" >> .config
            echo "   ✅ Added CONFIG_VERSIONOPT=y"
          fi
          BUILD_DATE_SHORT=$(date +%Y%m%d)
          BUILD_CODE=$(date +%y.%m.%d)
          sed -i '/^CONFIG_VERSION_DIST=/d' .config
          sed -i '/^CONFIG_VERSION_NUMBER=/d' .config
          sed -i '/^CONFIG_VERSION_CODE=/d' .config
          echo "CONFIG_VERSION_DIST=\"Z-ImmortalWrt\"" >> .config
          echo "CONFIG_VERSION_NUMBER=\"${BUILD_DATE_SHORT}\"" >> .config
          echo "CONFIG_VERSION_CODE=\"${BUILD_CODE}\"" >> .config
          echo "   ✅ Version config set: Z-ImmortalWrt ${BUILD_DATE_SHORT} by zuoxm | R${BUILD_CODE}"
          # 修改 DISTRIB_DESCRIPTION 模板，加入 "by zuoxm | R" 前缀
          echo "DISTRIB_DESCRIPTION='%D %V by zuoxm | R%C'" > package/base-files/files/etc/openwrt_release
          echo "   ✅ Modified openwrt_release template: %D %V by zuoxm | R%C"
          
          echo "=== Step 8c: Enable openssh-server and dependencies for SFTP/PAM ==="
          sed -i 's/^# CONFIG_PACKAGE_openssh-server is not set$/CONFIG_PACKAGE_openssh-server=y/' .config
          if grep -q "^CONFIG_PACKAGE_openssh-server=" .config 2>/dev/null; then
            echo "   ✅ Enabled CONFIG_PACKAGE_openssh-server=y (SFTP support for FinalShell)"
          else
            echo "CONFIG_PACKAGE_openssh-server=y" >> .config
            echo "   ✅ Added CONFIG_PACKAGE_openssh-server=y"
          fi
          # shadow-utils provides 'passwd' command and shadow password support (shadow绥.COM)
          sed -i 's/^# CONFIG_PACKAGE_shadow-utils is not set$/CONFIG_PACKAGE_shadow-utils=y/' .config
          if grep -q "^CONFIG_PACKAGE_shadow-utils=" .config 2>/dev/null; then
            echo "   ✅ Enabled CONFIG_PACKAGE_shadow-utils=y (shadow password support)"
          else
            echo "CONFIG_PACKAGE_shadow-utils=y" >> .config
            echo "   ✅ Added CONFIG_PACKAGE_shadow-utils=y"
          fi
          echo "   openssh-server: $(grep '^CONFIG_PACKAGE_openssh-server=' .config || echo 'NOT SET')"
          echo "   shadow-utils: $(grep '^CONFIG_PACKAGE_shadow-utils=' .config || echo 'NOT SET')"
          
          echo "=== Step 8d: Set kucat as default theme via UCI defaults ==="
          printf '#!/bin/sh\nuci set luci.main.mediaurlbase=/luci-static/kucat\nuci commit luci\n' > files/etc/uci-defaults/99-set-kucat-theme
          chmod +x files/etc/uci-defaults/99-set-kucat-theme
          echo "   ✅ Created uci-defaults: kucat as default theme"
          
          echo "=== Step 8e: Configure SSH for password auth ==="
          mkdir -p files/etc/ssh/sshd_config.d
          printf 'Port 22\nHostKey /etc/ssh/ssh_host_rsa_key\nHostKey /etc/ssh/ssh_host_ed25519_key\nPasswordAuthentication yes\nUsePAM no\nPermitRootLogin yes\nAuthorizedKeysFile .ssh/authorized_keys\nPermitEmptyPasswords no\nPubkeyAuthentication yes\nSubsystem sftp internal-sftp\n' > files/etc/ssh/sshd_config
          printf 'PasswordAuthentication yes\n' > files/etc/ssh/sshd_config.d/zz-password-auth.conf
          echo "   ✅ SSH config: PasswordAuthentication yes, UsePAM no"
          
          echo "=== Step 9: Final check of luci-app count BEFORE compilation ==="
          ORIG_LUCI=$(grep -c '^CONFIG_PACKAGE_luci' .config.original 2>/dev/null || echo 0)
          CURRENT_LUCI=$(grep -c '^CONFIG_PACKAGE_luci' .config 2>/dev/null || echo 0)
          echo "   .config.original has $ORIG_LUCI luci packages"
          echo "   Current .config has $CURRENT_LUCI luci packages"
          if [ "$CURRENT_LUCI" -lt "$ORIG_LUCI" ]; then
            echo "   ❌ Package count mismatch! Expected $ORIG_LUCI but got $CURRENT_LUCI"
            echo "   Missing packages will cause firmware size to be reduced!"
            echo "   Listing missing packages:"
            grep '^CONFIG_PACKAGE_luci' .config.original | while read pkg; do
              base=$(echo "$pkg" | sed 's/^CONFIG_PACKAGE_//;s/=y//')
              if ! grep -q "^CONFIG_PACKAGE_${base}=" .config 2>/dev/null; then
                echo "   MISSING: $base"
              fi
            done
            echo ""
            echo "   Build cannot continue with incorrect package count."
            exit 1
          else
            echo "   ✅ Package count verified: $CURRENT_LUCI luci packages"
          
                   echo "=== Step 9b: Final oldconfig to resolve dependencies ==="
          # Use oldconfig (not defconfig) to resolve dependencies without resetting restored packages
          # oldconfig only ADDS missing dependencies, does not remove explicit CONFIG_PACKAGE_xxx=y
          make oldconfig < /dev/null 2>&1 | tail -5 || true
          
                   echo "=== Step 9c: Force-restore luci packages (only if directories exist) ==="
          # defconfig may reset luci packages to # is not set, so restore them again
          # Only restore packages whose directories ACTUALLY exist in package/ or package/feeds/
          RESTORED=0
          MISSING=0
          while IFS= read -r pkg; do
            base_pkg=$(echo "$pkg" | sed 's/^CONFIG_PACKAGE_//;s/=y//')
            # Check if package directory exists
            PKG_DIR=""
            for dir in package/feeds/luci/${base_pkg} package/luci/${base_pkg} package/${base_pkg}; do
              if [ -d "$dir" ]; then
                PKG_DIR="$dir"
                break
              fi
            done
            if [ -n "$PKG_DIR" ]; then
              if grep -q "^# CONFIG_PACKAGE_${base_pkg} is not set" .config 2>/dev/null; then
                sed -i "s/# CONFIG_PACKAGE_${base_pkg} is not set/CONFIG_PACKAGE_${base_pkg}=y/" .config
              elif ! grep -q "^CONFIG_PACKAGE_${base_pkg}=" .config 2>/dev/null; then
                echo "CONFIG_PACKAGE_${base_pkg}=y" >> .config
              fi
              RESTORED=$((RESTORED + 1))
            else
              MISSING=$((MISSING + 1))
              echo "   Skipping $base_pkg: directory not found"
            fi
          done < /tmp/luci-apps.txt
          echo "   Restored $RESTORED packages, skipped $MISSING (not found in feeds)""" 
          
          echo "=== Step 9d: Final oldconfig to resolve dependencies ==="
          # After force-restoring packages, run oldconfig ONE MORE TIME to resolve new dependencies
          # Without this, some packages might have broken dependencies
          make oldconfig < /dev/null 2>&1 | tail -5 || true
          
          echo "=== Step 9e: Final verify ==="
          FINAL_LUCI=$(grep -c '^CONFIG_PACKAGE_luci' .config 2>/dev/null || echo 0)
          echo "   LuCI packages after final restore: $FINAL_LUCI"
          echo "   Expected: $ORIG_LUCI"
          if [ "$FINAL_LUCI" -lt "$ORIG_LUCI" ]; then
            echo "   ⚠️ WARNING: $((ORIG_LUCI - FINAL_LUCI)) packages still missing"
            echo "   This may cause reduced firmware size but continuing anyway..."
          else
            echo "   ✅ Package count verified: $FINAL_LUCI luci packages"
          fi
          
          echo "=== Step 9b: Re-apply version config after defconfig (defconfig may reset it) ==="
          sed -i 's/^# CONFIG_VERSIONOPT is not set$/CONFIG_VERSIONOPT=y/' .config
          if ! grep -q "^CONFIG_VERSIONOPT=" .config 2>/dev/null; then
            echo "CONFIG_VERSIONOPT=y" >> .config
          fi
          sed -i '/^CONFIG_VERSION_DIST=/d' .config
          sed -i '/^CONFIG_VERSION_NUMBER=/d' .config
          sed -i '/^CONFIG_VERSION_CODE=/d' .config
          echo "CONFIG_VERSION_DIST=\"Z-ImmortalWrt\"" >> .config
          echo "CONFIG_VERSION_NUMBER=\"${BUILD_DATE_SHORT}\"" >> .config
          echo "CONFIG_VERSION_CODE=\"${BUILD_CODE}\"" >> .config
          echo "   ✅ Version config re-applied after defconfig"
          # 同样确保 openwrt_release 在编译后重新写入
          echo "DISTRIB_DESCRIPTION='%D %V by zuoxm | R%C'" > package/base-files/files/etc/openwrt_release
          echo "   ✅ openwrt_release template re-set"
          sed -i 's/^# CONFIG_PACKAGE_shadow-utils is not set$/CONFIG_PACKAGE_shadow-utils=y/' .config
          if ! grep -q "^CONFIG_PACKAGE_shadow-utils=" .config 2>/dev/null; then
            echo "CONFIG_PACKAGE_shadow-utils=y" >> .config
          fi
          echo "   ✅ shadow-utils re-applied after defconfig"
          echo "   ✅ SSH config injected via files/etc/ssh/"
          fi
          
          echo "=== Step 10: Verify .config ==="
          echo "   LuCI packages after restore: $(grep -c '^CONFIG_PACKAGE_luci' .config)"
          echo "   Theme packages after restore: $(grep -c '^CONFIG_PACKAGE_luci-theme' .config)"
          echo "   zsh package: $(grep '^CONFIG_PACKAGE_zsh=' .config || echo 'NOT FOUND')"
          echo "   Chinese lang: $(grep '^CONFIG_LUCI_LANG_zh_Hans=' .config || echo 'NOT FOUND')"
          echo "   CONFIG_VERSIONOPT: $(grep '^CONFIG_VERSIONOPT=' .config || echo 'NOT SET')"
          echo "   openssh-server: $(grep '^CONFIG_PACKAGE_openssh-server=' .config || echo 'NOT SET')"
          
          echo "=== Step 10.5: Resolve dependencies for restored packages (AFTER all restores) ==="
          # 在所有 restore 完成后调用 oldconfig，此时 .config 已有 luci-app=y 等条目
          # oldconfig 会为这些显式启用的包添加必要的依赖（如 libjson-c、libubus 等）
          # 不会像旧流程那样在 restore 之前调用 oldconfig（会导致包被上游默认值清除）
          make oldconfig < /dev/null 2>&1 | tail -10 || true
          echo "   ✅ Dependencies resolved"
          
          echo "=== Step 11: Final cleanup - remove problematic packages ==="
          # 这些包有递归依赖或编译问题，每次都清理一遍
          # 显式标记为“不启用”，防止后续 make 重新添加
          for pkg in openvswitch ovsd mihomo-alpha; do
            sed -i "/^CONFIG_PACKAGE_.*${pkg}/d" .config
            echo "   🧹 Removed: $pkg"
          done
          
          # shadowsocksr-libev：先删配置行，再显式标记为不启用
          for pkg in shadowsocksr-libev-ssr-local shadowsocksr-libev-ssr-redir shadowsocksr-libev-ssr-server shadowsocksr-libev-ssr-check shadowsocksr-libev-ssr-nat; do
            sed -i "/CONFIG_PACKAGE_${pkg}/d" .config
            echo "# CONFIG_PACKAGE_${pkg} is not set" >> .config
          done
          
          # 禁用 passwall2 中依赖 shadowsocksr 的 include 选项
          sed -i '/INCLUDE_ShadowsocksR_Libev_Client/d' .config
          echo '# CONFIG_PACKAGE_luci-app-passwall2_INCLUDE_ShadowsocksR_Libev_Client is not set' >> .config
          sed -i '/INCLUDE_Shadowsocks_Libev_Client/d' .config
          echo '# CONFIG_PACKAGE_luci-app-passwall2_INCLUDE_Shadowsocks_Libev_Client is not set' >> .config
          echo "   🧹 Disabled: passwall2 shadowsocksr/libev includes"
          
          # 删除已被上游移除的内核补丁（否则编译 kernel-headers 会失败）
          for p in 742-*; do
            find target/linux -name "$p" -delete 2>/dev/null || true
          done
          echo "   🧹 Removed stale kernel patches (742-*)"
          
          echo "   ✅ Config ready — no additional defconfig to avoid overwriting restored packages"

      - name: Prepare config
        run: |
          echo "=== 验证配置完整性 ==="
          echo "原始 LuCI 包数量：$(grep -c '^CONFIG_PACKAGE_luci' .config.original)"
          echo "最终 LuCI 包数量：$(grep -c '^CONFIG_PACKAGE_luci' .config)"
          echo "总包数量：$(grep -c '^CONFIG_PACKAGE_' .config)"
          echo "EFI Images: $(grep 'CONFIG_EFI' .config || echo 'NOT FOUND')"
          echo "GRUB EFI: $(grep 'CONFIG_GRUB_EFI' .config || echo 'NOT FOUND')"
          echo "EXT4FS: $(grep 'CONFIG_TARGET_ROOTFS_EXT4FS' .config || echo 'NOT FOUND')"

      - name: Install qemu-img
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils

      - name: Download toolchain
        run: make download -j$(nproc)

      - name: Compile firmware
        run: |
          echo "=== 开始编译 ==="
          echo "CPU cores: $(nproc)"
          
          echo "=== 第一步：编译工具链和包 ==="
          make -j$(nproc) V=s 2>&1 | tee /tmp/build.log | tail -300
          
          echo "=== 第二步：生成镜像（包含files目录） ==="
          # OpenWrt automatically includes files/ from source root into rootfs
          # Remove the redundant copy step - OpenWrt handles it
          make target/install 2>&1 | tee -a /tmp/build.log | tail -100
          
          echo "=== 编译结束 ==="
          echo "=== 检查 bin 目录 ==="
          ls -la bin/targets/x86/64/ 2>/dev/null || echo "targets dir not found"
          find bin -name "*.img*" -o -name "*.vmdk*" -o -name "*.ext4*" 2>/dev/null | head -20 || echo "No image files"

      - name: Check output
        run: |
          echo "=== 检查编译产物 ==="
          find bin/targets -name "*.img.gz" -ls 2>/dev/null || echo "No img.gz found"
          MANIFEST_FILES=$(find bin/targets -name "*.manifest" 2>/dev/null)
          if [ -z "$MANIFEST_FILES" ]; then
            echo "❌ 未找到 manifest 文件"
            exit 1
          fi
          # Use grep | wc -l to get total count across all manifests (safer than grep -c with multi-line output)
          TOTAL_LUCI=$(cat $MANIFEST_FILES 2>/dev/null | grep -c "luci-app" || echo "0")
          echo "LuCI packages in manifest: $TOTAL_LUCI"
          if [ "$TOTAL_LUCI" -eq 0 ]; then
            echo "❌ 严重错误：固件中没有 LuCI 插件！"
            echo "   manifest 文件内容（前30行）："
            cat $MANIFEST_FILES 2>/dev/null | head -30
            exit 1
          fi
          echo "✅ 固件包含 $TOTAL_LUCI 个 LuCI 插件"
          ls -la bin/targets/x86/64/ 2>/dev/null || echo "Target dir not found"

      - name: Rename and package firmware
        id: rename
        run: |
          echo "=== 检查编译产物 ==="
          find bin -type f -name "*.img*" 2>/dev/null || echo "No img files"
          
          # 优先选择 ext4-combined-efi 文件（之前版本）
          SOURCE_FILE=$(find bin/targets -type f -name "*ext4-combined-efi.img.gz" 2>/dev/null | head -1)
          
          # 如果没有 ext4，尝试 squashfs-combined-efi（上游更新后默认格式）
          if [ -z "$SOURCE_FILE" ]; then
            SOURCE_FILE=$(find bin/targets -type f -name "*squashfs-combined-efi.img.gz" 2>/dev/null | head -1)
            if [ -n "$SOURCE_FILE" ]; then
              echo "   📝 使用 squashfs 格式（上游默认）"
            fi
          fi
          
          # 如果都没有，尝试 targz-combined-efi
          if [ -z "$SOURCE_FILE" ]; then
            SOURCE_FILE=$(find bin/targets -type f -name "*targz-combined-efi.img.gz" 2>/dev/null | head -1)
            if [ -n "$SOURCE_FILE" ]; then
              echo "   📝 使用 targz 格式（备用）"
            fi
          fi
          
          # 最后兜底：找任何 .img.gz 文件（排除 rootfs）
          if [ -z "$SOURCE_FILE" ]; then
            SOURCE_FILE=$(find bin/targets -type f \( -name "*.img.gz" -o -name "*.img" -o -name "*.vmdk" \) 2>/dev/null | grep -v rootfs | head -1)
          fi
          
          if [ -z "$SOURCE_FILE" ]; then
            echo "❌ 未找到固件文件"
            ls -laR bin/ | head -50
            exit 1
          fi
          
          echo "✅ 找到固件：$SOURCE_FILE"
          FIRM_SIZE=$(du -h "$SOURCE_FILE" | cut -f1)
          echo "   Firmware size: $FIRM_SIZE"
          
          BASENAME=$(basename "$SOURCE_FILE")
          DATE=$(date +%Y%m%d)
          # 新命名格式：Z-ImmWrt-YYYYMMDD-zuoxm-x86_64-efi.img.gz
          TARGET_FILE="Z-ImmWrt-${DATE}-zuoxm-x86_64-efi.img.gz"
          
          cp "$SOURCE_FILE" "$TARGET_FILE"
          sha256sum "$TARGET_FILE" > "${TARGET_FILE}.sha256"
          
          echo "✅ 固件打包完成"
          echo "   源文件：$BASENAME"
          echo "   目标文件：$TARGET_FILE"
          ls -lh "$TARGET_FILE" "${TARGET_FILE}.sha256"
          
          echo "date=${DATE}" >> $GITHUB_OUTPUT

      - name: Upload to Releases
        uses: softprops/action-gh-release@v3
        with:
          tag_name: Z-ImmWrt-${{ steps.rename.outputs.date }}
          name: Z-ImmWrt-${{ steps.rename.outputs.date }}
          body: |
            **Build Time:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
            **Platform:** x86_64 EFI
            **Firmware Size:** $(ls -lh Z-ImmWrt-*.img.gz | awk '{print $2}')
            **Packages:** $(grep -c '^CONFIG_PACKAGE_' .config) total, $(grep -c '^CONFIG_PACKAGE_luci' .config) luci
          files: |
            Z-ImmWrt-*.img.gz
            Z-ImmWrt-*.sha256
            bin/targets/x86/64/*.manifest
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload packages to zxm_immortalwrt_packages
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: |
          PKG_TAG="v${{ steps.rename.outputs.date }}"
          
          echo "=== 收集编译好的插件包（仅 zxm_immortalwrt_packages 来源）==="
          PKG_DIR="packages_upload"
          mkdir -p "$PKG_DIR"
          
          # 仅收集来自 zxm_immortalwrt_packages feed 的包（feeds/zuoxm/ 下的各子目录）
          # 这些包的源码目录在 feeds/zuoxm/{subdir}/，通过编译输出文件名可识别来源
          # 定义来自 zxm_immortalwrt_packages 的包名前缀（不含 feeds 路径前缀）
          ZXM_PREFIXES="luci-app-adguardhome luci-app-advancedplus luci-app-chatgpt-web luci-app-eqosplus luci-app-kucat-config luci-app-momo luci-app-netdata luci-app-netwizard luci-app-openclash luci-app-ota luci-app-passwall luci-app-passwall2 luci-app-poweroffdevice luci-app-tailscale luci-app-taskplan luci-app-timecontrol luci-app-wechatpush luci-app-wolplus luci-app-wrtbwmon luci-app-znetcontrol luci-theme-kucat luci-lib-taskd luci-lib-xterm taskd bandix easytier lucky momo netspeedtest nikki watchdog wrtbwmon chinadns-ng geoview hysteria ipt2socks microsocks naiveproxy simple-obfs shadowsocks-rust shadow-tls sing-box tcping trojan-plus tuic-client v2ray-plugin xray-plugin xray-core dns2socks"
          
          echo "=== 扫描 bin/packages 和 bin/targets 中的 APK/IPK 文件 ==="
          for dir in bin/packages/x86_64 bin/targets/x86/64; do
            find "$dir" \( -name "*.apk" -o -name "*.ipk" \) -type f 2>/dev/null | while read f; do
              PKG_NAME=$(basename "$f" | sed 's/_[0-9].*//')
              for prefix in $ZXM_PREFIXES; do
                if [ "$PKG_NAME" = "$prefix" ]; then
                  cp "$f" "$PKG_DIR/"
                  echo "   ✅ $PKG_NAME"
                  break
                fi
              done
            done
          done
          
          PKG_COUNT=$(find "$PKG_DIR" \( -name "*.apk" -o -name "*.ipk" \) -type f 2>/dev/null | wc -l)
          
          if [ "$PKG_COUNT" -eq 0 ]; then
            echo "⚠️ 没有找到来自 zxm_immortalwrt_packages 的插件包"
            exit 0
          fi
          
          echo "✅ 共收集 $PKG_COUNT 个 zxm 插件包"
          echo "   总大小: $(du -sh "$PKG_DIR" | cut -f1)"
          
          # 发布到 zxm_immortalwrt_packages
          echo "=== 发布到 zxm_immortalwrt_packages ==="
          cd "$PKG_DIR"
          
          # 检查是否已存在相同 tag
          if gh release view "$PKG_TAG" --repo zxmlysxl/zxm_immortalwrt_packages &>/dev/null; then
            echo "⚠️ Tag $PKG_TAG 已存在，跳过发布"
            exit 0
          fi
          
          # 列出所有插件包文件
          PKG_FILES=$(find . -maxdepth 1 \( -name "*.apk" -o -name "*.ipk" \) -type f 2>/dev/null | sort)
          PKG_COUNT=$(find . -maxdepth 1 \( -name "*.apk" -o -name "*.ipk" \) -type f 2>/dev/null | wc -l)
          
          if [ "$PKG_COUNT" -eq 0 ]; then
            echo "⚠️ 没有找到 .apk 或 .ipk 文件可上传"
            exit 0
          fi
          
          echo "📤 共 $PKG_COUNT 个插件包，共计 $(du -sh . | cut -f1)"
          
          # 分批上传，避免一次上传490个文件触发 GitHub 二次速率限制
          echo "=== 创建 Release ==="
          gh release create "$PKG_TAG" \
            --repo zxmlysxl/zxm_immortalwrt_packages \
            --title "Z-Packages v${{ steps.rename.outputs.date }}" \
            --notes "Build from immortalwrt ${{ steps.rename.outputs.date }} | $PKG_COUNT packages"
          
          echo "=== 分批上传插件包（每批30个，间隔3秒）==="
          
          # 列出所有文件到数组
          mapfile -t PKG_LIST < <(find . -maxdepth 1 \( -name "*.apk" -o -name "*.ipk" \) -type f 2>/dev/null | sort)
          TOTAL=${#PKG_LIST[@]}
          echo "   共 $TOTAL 个文件待上传"
          
          BATCH_SIZE=30
          UPLOADED=0
          FAILED=0
          BATCH_NUM=1
          
          for ((idx=0; idx<TOTAL; idx+=BATCH_SIZE)); do
            # 取当前批次
            BATCH=("${PKG_LIST[@]:idx:BATCH_SIZE}")
            COUNT=${#BATCH[@]}
            echo "   ⏫ 第 $BATCH_NUM 批（$COUNT 个文件）"
            
            gh release upload "$PKG_TAG" --repo zxmlysxl/zxm_immortalwrt_packages "${BATCH[@]}" 2>&1 || {
              echo "   ⚠️ 第 $BATCH_NUM 批部分失败，重试一次..."
              sleep 5
              gh release upload "$PKG_TAG" --repo zxmlysxl/zxm_immortalwrt_packages "${BATCH[@]}" 2>&1 || FAILED=$((FAILED + 1))
            }
            
            UPLOADED=$((UPLOADED + COUNT))
            BATCH_NUM=$((BATCH_NUM + 1))
            echo "   ✅ 进度: $UPLOADED / $TOTAL"
            
            if [ $UPLOADED -lt $TOTAL ]; then
              echo "   😴 等待3秒避免限流..."
              sleep 3
            fi
          done
          
          echo "✅ 上传完成：共 $UPLOADED 个插件包到 zxm_immortalwrt_packages: $PKG_TAG"


