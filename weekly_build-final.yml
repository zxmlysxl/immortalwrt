name: Build ImmortalWrt x86_64

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (rebuild everything)'
        required: false
        default: 'false'

jobs:
  build:
    name: Build ImmortalWrt x86_64 EFI
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy custom files
        run: |
          if [ -d "files" ]; then
            cp -rf files/* ./
          fi

      - name: Initialize feeds
        run: |
          echo "=== Step 1: Update feeds ==="
          ./scripts/feeds update -a
          
          echo "=== Step 2: Install feeds (1st pass) ==="
          ./scripts/feeds install -a
          
          echo "=== Step 3: Install feeds (2nd pass) ==="
          ./scripts/feeds install -a
          
          echo "=== Step 4: Verify luci package ==="
          if [ -d "feeds/luci/collections/luci" ]; then
            echo "✅ luci package directory exists"
          else
            echo "❌ luci package directory NOT found!"
            exit 1
          fi

      - name: Apply .config
        run: |
          echo "=== 应用本地 .config 配置 ==="
          if [ -f ".config" ]; then
            echo "✅ .config 文件存在"
            echo "   大小：$(du -h .config | cut -f1)"
            echo "   行数：$(wc -l < .config)"
            echo "   软件包数：$(grep -c '^CONFIG_PACKAGE_' .config)"
            echo "   LuCI 包数：$(grep -c '^CONFIG_PACKAGE_luci' .config)"
            
            # 直接复制 .config 到构建目录
            cp .config build.config
            
            # 运行 oldconfig 应用配置（不修改已有配置）
            yes "" | make oldconfig
            
            echo "✅ 配置应用完成"
          else
            echo "❌ .config 文件不存在!"
            exit 1
          fi

      - name: Install qemu-img
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils

      - name: Download toolchain
        run: make download -j$(nproc)

      - name: Compile firmware
        run: |
          echo "=== 开始编译 ==="
          echo "CPU 核心数：$(nproc)"
          make -j$(nproc) || make -j1 V=s

      - name: Rename and package firmware
        run: |
          cd bin/targets/x86/64
          DATE=$(date +%Y%m%d)
          SOURCE_FILE="immortalwrt-x86-64-generic-squashfs-combined-efi.img.gz"
          TARGET_FILE="Z-ImmWrt-${DATE}-zuoxm-x86_64-efi.img.gz"
          if [ -f "$SOURCE_FILE" ]; then
            cp "$SOURCE_FILE" "$TARGET_FILE"
            sha256sum "$TARGET_FILE" > "${TARGET_FILE}.sha256"
            rm -f "$SOURCE_FILE"
            ls -lh "$TARGET_FILE"*
          else
            echo "❌ 固件文件未找到!"
            exit 1
          fi

      - name: Upload to Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: ImmortalWrt x86_64 EFI - ${{ github.run_number }}
          body: |
            **Build Time:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
            **Platform:** x86_64 EFI
          files: |
            bin/targets/x86/64/Z-ImmWrt-*.img.gz
            bin/targets/x86/64/Z-ImmWrt-*.sha256
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
